<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lovesong</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    :root{
      --bg: #0b0f14;
      --panel: rgba(0,0,0,.55);
      --panel2: rgba(0,0,0,.35);
      --white: rgba(255,255,255,.92);
      --dim: rgba(255,255,255,.62);
      --dim2: rgba(255,255,255,.35);

      --track: rgba(255,255,255,.18);
      --fill: rgba(255,255,255,.65);

      --cyan: #79d8ff;
      --cyanGlow: rgba(121,216,255,.35);

      --shadow: 0 28px 70px rgba(0,0,0,.6);
      --shadowSoft: 0 18px 44px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at 50% 35%, rgba(60,80,105,.35), transparent 45%),
        radial-gradient(circle at 50% 70%, rgba(0,0,0,.75), rgba(0,0,0,.95)),
        var(--bg);
      overflow:hidden;
      color: var(--white);
    }

    /* виньетка */
    body::after{
      content:"";
      position:fixed;
      inset:-40px;
      background: radial-gradient(circle at center, transparent 35%, rgba(0,0,0,.60) 100%);
      pointer-events:none;
    }

    .player{
      width:min(980px, 92vw);
      aspect-ratio: 16 / 7;
      border-radius: 34px;
      background: linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.40));
      box-shadow: var(--shadow);
      position:relative;
      overflow:hidden;
    }

    /* стекло */
    .player::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 35% 35%, rgba(121,216,255,.16), transparent 55%),
        radial-gradient(circle at 65% 60%, rgba(255,255,255,.06), transparent 55%);
      filter: blur(1px);
      pointer-events:none;
    }

    .inner{
      position:relative;
      z-index:1;
      height:100%;
      padding: 22px;
      display:grid;
      grid-template-columns: 38% 62%;
      gap: 18px;
      align-items:stretch;
    }

    /* ===== LEFT (обложка) ===== */
    .artWrap{
      background: rgba(255,255,255,.06);
      border-radius: 26px;
      padding: 16px;
      box-shadow: var(--shadowSoft); /* тень как на примере */
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
    }

    .art{
      width:100%;
      height:100%;
      border-radius: 22px;
      background: rgba(0,0,0,.35);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
      overflow:hidden;
      position:relative;
    }

    canvas{
      width:100%;
      height:100%;
      display:block;
      filter: drop-shadow(0 0 22px var(--cyanGlow)); /* тень/свечение сердца */
    }

    /* ===== RIGHT ===== */
    .right{
      border-radius: 26px;
      background: rgba(0,0,0,.18);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
      padding: 20px 22px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }

    .device{
      font-size: 14px;
      color: rgba(255,255,255,.75);
      letter-spacing:.2px;
      margin-bottom: 8px;
    }

    .songTitle{
      font-size: clamp(24px, 3.2vw, 34px);
      font-weight: 800;
      line-height: 1.1;
      margin: 0;
    }

    .artist{
      margin-top: 6px;
      font-size: 15px;
      color: rgba(255,255,255,.70);
    }

    /* progress top (как на примере) */
    .progressRow{
      margin-top: 18px;
      display:grid;
      grid-template-columns: 48px 1fr 56px;
      gap: 12px;
      align-items:center;
      color: rgba(255,255,255,.65);
      font-variant-numeric: tabular-nums;
      font-size: 12px;
    }

    .bar{
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      overflow:hidden;
      position:relative;
    }
    .fill{
      height: 100%;
      width: 0%;
      background: rgba(255,255,255,.70);
      border-radius: 999px;
      transition: width .06s linear;
    }

    /* controls */
    .controls{
      margin-top: 18px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 26px;
    }

    .iconBtn{
      width: 62px;
      height: 62px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
      display:grid;
      place-items:center;
      cursor:pointer;
      transition: transform .12s ease, background .12s ease;
      box-shadow: 0 14px 28px rgba(0,0,0,.28); /* тень у плеера */
      user-select:none;
    }
    .iconBtn:active{ transform: scale(.98); }
    .iconBtn:hover{ background: rgba(255,255,255,.10); }

    .mainBtn{
      width: 78px;
      height: 78px;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
    }

    svg{ display:block; }
    .ico{
      fill: rgba(255,255,255,.88);
    }

    /* lyrics bottom small (как на примере) */
    .lyrics{
      margin-top: 18px;
      padding-top: 10px;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height: 90px;
    }

    .lyricsText{
      text-align:center;
      font-size: clamp(14px, 1.7vw, 18px);
      line-height: 1.55;
      color: rgba(255,255,255,.70);
    }

    .w{
      display:inline-block;
      padding: 2px 4px;
      border-radius: 8px;
      color: rgba(255,255,255,.38);
      transition: background .12s ease, color .12s ease, box-shadow .12s ease;
      margin: 0 2px;
    }
    .w.active{
      color: #eaffff;
      background: rgba(121,216,255,.16);
      box-shadow: 0 0 0 1px rgba(121,216,255,.35) inset, 0 0 14px rgba(121,216,255,.18);
    }

    /* bottom volume like iOS */
    .volumeRow{
      margin-top: auto;
      padding-top: 14px;
      display:flex;
      align-items:center;
      gap: 12px;
      opacity: .95;
    }

    .volIcon{
      width: 18px;
      opacity:.85;
      fill: rgba(255,255,255,.75);
    }

    .volBar{
      flex:1;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.15);
      overflow:hidden;
    }
    .volFill{
      width: 42%;
      height: 100%;
      background: rgba(255,255,255,.55);
    }

    audio{ display:none; }

    @media (max-width: 820px){
      .inner{ grid-template-columns: 1fr; }
      .player{ aspect-ratio: 4 / 5; }
      .volumeRow{ margin-top: 18px; }
    }
  </style>
</head>

<body>
  <div class="player">
    <div class="inner">
      <!-- LEFT: ART -->
      <div class="artWrap">
        <div class="art">
          <canvas id="heartCanvas"></canvas>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="right">
        <div class="device">iPhone</div>
        <h1 class="songTitle">Lovesong</h1>
        <div class="artist">Adele</div>

        <!-- progress -->
        <div class="progressRow">
          <div id="tCur">0:00</div>
          <div class="bar"><div class="fill" id="fill"></div></div>
          <div id="tDur">0:16</div>
        </div>

        <!-- controls -->
        <div class="controls">
          <button class="iconBtn" id="prevBtn" title="Prev">
            <svg width="26" height="26" viewBox="0 0 24 24" aria-hidden="true">
              <path class="ico" d="M6 5h2v14H6V5zm3 7l9-7v14l-9-7z"></path>
            </svg>
          </button>

          <button class="iconBtn mainBtn" id="playBtn" title="Play/Pause">
            <!-- будет меняться -->
            <svg id="playIcon" width="30" height="30" viewBox="0 0 24 24" aria-hidden="true">
              <path class="ico" d="M8 5v14l11-7z"></path>
            </svg>
          </button>

          <button class="iconBtn" id="nextBtn" title="Next">
            <svg width="26" height="26" viewBox="0 0 24 24" aria-hidden="true">
              <path class="ico" d="M16 5h2v14h-2V5zM6 19V5l9 7-9 7z"></path>
            </svg>
          </button>
        </div>

        <!-- lyrics -->
        <div class="lyrics">
          <div class="lyricsText" id="lyricsBox"></div>
        </div>

        <!-- volume -->
        <div class="volumeRow">
          <svg class="volIcon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 10v4h4l5 4V6L7 10H3z"></path>
          </svg>
          <div class="volBar"><div class="volFill"></div></div>
          <svg class="volIcon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zM16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"></path>
          </svg>
        </div>

        <audio id="audio" preload="auto">
          <source src="song.mp3" type="audio/mpeg">
        </audio>
      </div>
    </div>
  </div>

<script>

const rawWords = [
  { w:"However", t:0.01 },
  { w:"far",     t:0.02 },
  { w:"away,",   t:0.03 },
  { w:"I",       t:0.04 },
  { w:"will",    t:0.05 },
  { w:"always",  t:0.06 },
  { w:"love",    t:0.07 },
  { w:"you.",    t:0.08 },

  { w:"However", t:0.09 },
  { w:"long",    t:0.10 },
  { w:"I",       t:0.11 },
  { w:"stay,",   t:0.12 },
  { w:"I",       t:0.13 },
  { w:"will",    t:0.135 },
  { w:"always",  t:0.14 },
  { w:"love",    t:0.145 },
  { w:"you.",    t:0.15 },
];

const words = rawWords.map(x => ({ w:x.w, t: x.t * 100 })); // 0.15 -> 15 sec

const lyricsBox = document.getElementById("lyricsBox");

const line1 = words.slice(0,8);
const line2 = words.slice(8);

let globalIdx = 0;
line1.forEach(x => x.idx = globalIdx++);
line2.forEach(x => x.idx = globalIdx++);

function renderLine(arr){
  return arr.map(x => `<span class="w" data-idx="${x.idx}">${x.w}</span>`).join(" ");
}
lyricsBox.innerHTML = `
  <div>${renderLine(line1)}</div>
  <div style="margin-top:8px">${renderLine(line2)}</div>
`;

const spans = Array.from(document.querySelectorAll(".w"));

function clearActive(){
  const prev = document.querySelector(".w.active");
  if(prev) prev.classList.remove("active");
}
function setActive(idx){
  clearActive();
  const el = spans.find(s => Number(s.dataset.idx) === idx);
  if(el) el.classList.add("active");
}

function getWordIndexByTime(t){
  if(t < words[0].t) return -1;
  for(let i = words.length-1; i>=0; i--){
    if(t >= words[i].t) return i;
  }
  return -1;
}

const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

const playIcon = document.getElementById("playIcon");
const fill = document.getElementById("fill");
const tCur = document.getElementById("tCur");
const tDur = document.getElementById("tDur");

function fmt(sec){
  sec = Math.max(0, Math.floor(sec));
  const m = Math.floor(sec/60);
  const s = sec%60;
  return `${m}:${String(s).padStart(2,"0")}`;
}

tDur.textContent = "0:16";

audio.addEventListener("loadedmetadata", () => {
  if(Number.isFinite(audio.duration)) tDur.textContent = fmt(audio.duration);
});

function setPlayUI(isPlaying){
  if(isPlaying){
    playIcon.innerHTML = `<path class="ico" d="M6 5h4v14H6V5zm8 0h4v14h-4V5z"></path>`;
  }else{
    playIcon.innerHTML = `<path class="ico" d="M8 5v14l11-7z"></path>`;
  }
}

let lastActive = -2;

audio.addEventListener("timeupdate", () => {
  const cur = audio.currentTime || 0;
  const dur = audio.duration || 16;

  tCur.textContent = fmt(cur);
  tDur.textContent = fmt(dur);

  const p = Math.min(1, cur / dur);
  fill.style.width = (p*100).toFixed(2) + "%";

  const idx = getWordIndexByTime(cur);
  if(idx !== lastActive){
    lastActive = idx;
    if(idx >= 0) setActive(idx);
  }
});

audio.addEventListener("ended", () => {
  setPlayUI(false);
  stopHeartAnim();
  fill.style.width = "0%";
  tCur.textContent = "0:00";
  clearActive();
  lastActive = -2;
});

playBtn.addEventListener("click", async () => {
  try{
    if(audio.paused){
      await audio.play();
      setPlayUI(true);
      startHeartAnim();
    }else{
      audio.pause();
      setPlayUI(false);
      stopHeartAnim();
    }
  }catch(e){
    console.log(e);
  }
});

prevBtn.addEventListener("click", () => {
  audio.currentTime = Math.max(0, audio.currentTime - 2);
});
nextBtn.addEventListener("click", () => {
  const dur = audio.duration || 16;
  audio.currentTime = Math.min(dur, audio.currentTime + 2);
});

const canvas = document.getElementById("heartCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  canvas.width  = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(rect.height * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const TEXT = " I love you ";
const SCALE = 7.8;

let offset = 0;
let pulse = 0;
let particles = [];
let raf = null;

function heart(t){
  const x = 16*Math.pow(Math.sin(t),3);
  const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
  return {x,y};
}

function draw(){
  const w = canvas.getBoundingClientRect().width;
  const h = canvas.getBoundingClientRect().height;

  ctx.clearRect(0,0,w,h);

  const g = ctx.createRadialGradient(w*0.5,h*0.35,20,w*0.5,h*0.55,w*0.9);
  g.addColorStop(0, "rgba(121,216,255,0.08)");
  g.addColorStop(1, "rgba(0,0,0,0.28)");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,w,h);

  ctx.save();
  ctx.translate(w/2, h/2);

  const pulseScale = 1 + Math.sin(pulse)*0.03;
  ctx.font = "16px Inter";

  let charIndex = 0;

  for(let t=0; t<Math.PI*2; t+=0.05){
    const shifted = t + offset;
    const p = heart(shifted);
    const next = heart(shifted + 0.01);

    const x = p.x * SCALE * pulseScale;
    const y = -p.y * SCALE * pulseScale;

    const angle = Math.atan2(-(next.y - p.y), next.x - p.x);

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);

    ctx.fillStyle = "rgba(121,216,255,0.95)";
    ctx.shadowColor = "rgba(121,216,255,0.70)";
    ctx.shadowBlur = 16;

    ctx.fillText(TEXT[charIndex], 0, 0);
    ctx.restore();

    charIndex++;
    if(charIndex>=TEXT.length) charIndex=0;

    if(Math.random() < 0.01){
      particles.push({x, y, life: 28});
    }
  }

  particles.forEach((p, i) => {
    ctx.globalAlpha = p.life/28;
    ctx.fillStyle = "rgba(121,216,255,0.9)";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.4, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    p.life--;
    if(p.life<=0) particles.splice(i,1);
  });

  ctx.restore();

  offset += 0.012;
  pulse  += 0.04;

  raf = requestAnimationFrame(draw);
}

function startHeartAnim(){
  if(raf) return;
  raf = requestAnimationFrame(draw);
}
function stopHeartAnim(){
  if(!raf) return;
  cancelAnimationFrame(raf);
  raf = null;
}

setPlayUI(false);
stopHeartAnim();
</script>
</body>
</html>
